<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#1D9E75"><title>מעקב הוצאות</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:480px;margin:0 auto}h1{font-size:18px;padding:14px 16px;background:#1D9E75;color:#fff}.months{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #eee}.months::-webkit-scrollbar{display:none}.mb{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#666}.mb.on{background:#1D9E75;border-color:#1D9E75;color:#fff}.mb.has{border-color:#1D9E75;color:#1D9E75}.mb.on.has{color:#fff}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}.kpi{background:#fff;border-radius:12px;padding:12px;border:1px solid #eee}.kl{font-size:12px;color:#888;margin-bottom:4px}.kv{font-size:22px;font-weight:700;color:#1a1a1a}.kv.r{color:#D85A30}.kv.g{color:#1D9E75}.ks{font-size:11px;color:#aaa;margin-top:2px}.tabs{display:flex;background:#fff;border-bottom:1px solid #eee}.tab{flex:1;padding:10px 0;font-size:13px;color:#888;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}.tab.on{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:700}.page{padding:12px 16px 80px}.card{background:#fff;border-radius:14px;padding:14px;border:1px solid #eee;margin-bottom:12px}input[type=text],input[type=number]{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:10px;font-family:inherit;color:#1a1a1a;background:#fff}input:focus{outline:none;border-color:#1D9E75}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}.chip{padding:5px 11px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#666}.chip.on{color:#fff;border-color:transparent}.btn{width:100%;padding:12px;border-radius:10px;border:none;background:#1D9E75;color:#fff;font-size:15px;font-weight:700;cursor:pointer}.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}.rl{display:flex;align-items:center;gap:8px}.dot{width:9px;height:9px;border-radius:50%}.en{font-size:14px;font-weight:500}.em{font-size:11px;color:#aaa}.ea{font-size:14px;font-weight:700}.dx{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:2px 6px}.empty{text-align:center;padding:24px;color:#bbb;font-size:13px}.stitle{font-size:14px;font-weight:700;margin-bottom:10px;color:#333}.cbar{display:flex;align-items:center;gap:8px;margin-bottom:8px}.clbl{font-size:12px;color:#666;width:56px;text-align:right;flex-shrink:0}.ctrk{flex:1;background:#eee;border-radius:3px;height:8px;overflow:hidden}.cfil{height:100%;border-radius:3px}.cval{font-size:12px;font-weight:700;width:56px;text-align:right;flex-shrink:0}</style></head><body><h1>&#x1F4B0; מעקב הוצאות <span id="yr" style="font-size:13px;opacity:0.8"></span></h1><div class="months" id="ms"></div><div class="kpis"><div class="kpi"><div class="kl">החודש</div><div class="kv r" id="km">&#8362;0</div><div class="ks" id="kmc">0 הוצאות</div></div><div class="kpi"><div class="kl">השנה</div><div class="kv g" id="ky">&#8362;0</div><div class="ks" id="kav">ממוצע &#8362;0</div></div><div class="kpi"><div class="kl">חודש גבוה</div><div class="kv" id="ktm" style="font-size:18px">&#8212;</div><div class="ks" id="ktv"></div></div><div class="kpi"><div class="kl">קטגוריה מובילה</div><div class="kv" id="ktc" style="font-size:16px">&#8212;</div><div class="ks" id="ktcv"></div></div></div><div class="tabs"><button class="tab on" onclick="sv('add')" id="ta">+ הוסף</button><button class="tab" onclick="sv('list')" id="tl">רשימה</button><button class="tab" onclick="sv('stats')" id="ts">סטטיסטיקה</button></div><div id="va" class="page"><div class="card"><input type="text" id="en" placeholder="תיאור ההוצאה" /><input type="number" id="ea" placeholder="סכום בשקלים" inputmode="decimal" min="0" /><div class="chips" id="ch"></div><button class="btn" onclick="add()">+ הוסף הוצאה</button></div><div class="stitle">3 אחרונות</div><div id="rl"></div></div><div id="vl" class="page" style="display:none"><div class="stitle" id="lt"></div><div id="fl"></div></div><div id="vs" class="page" style="display:none"><div class="stitle">הוצאות לפי חודש</div><div id="cb"></div></div><script>var MN=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];var MF=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];var CATS=[{n:'מזון',c:'#1D9E75'},{n:'תחבורה',c:'#378ADD'},{n:'דיור',c:'#7F77DD'},{n:'בידור',c:'#D4537E'},{n:'בריאות',c:'#E24B4A'},{n:'קניות',c:'#BA7517'},{n:'חינוך',c:'#639922'},{n:'אחר',c:'#888780'}];var NOW=new Date(),YEAR=NOW.getFullYear();var curM=NOW.getMonth(),selC=CATS[0].n,db={};try{db=JSON.parse(localStorage.getItem('ez'+YEAR)||'{}')}catch(e){}function save(){try{localStorage.setItem('ez'+YEAR,JSON.stringify(db))}catch(e){}}function fmt(n){return '\u20AA'+Math.round(n).toLocaleString()}function md(m){return db[m]||[]}function mt(m){return md(m).reduce(function(s,e){return s+e.a},0)}function yt(){var t=0;for(var m=0;m<12;m++)t+=mt(m);return t}function rMs(){document.getElementById('ms').innerHTML=MN.map(function(m,i){var h=md(i).length>0;return '<button class="mb'+(i===curM?' on':'')+(h?' has':'') +'" onclick="setM('+i+')">'+m+'</button>';}).join('');}function setM(m){curM=m;rMs();rKPI();rAll()}function rKPI(){var mT=mt(curM),mC=md(curM).length,yT=yt();var am=0;for(var m=0;m<12;m++)if(mt(m)>0)am++;if(am===0)am=1;document.getElementById('km').innerHTML=fmt(mT);document.getElementById('kmc').textContent=mC+' הוצאות';document.getElementById('ky').innerHTML=fmt(yT);document.getElementById('kav').innerHTML='ממוצע '+fmt(Math.round(yT/am));var tm=-1,tv=0;for(var m=0;m<12;m++){var t=mt(m);if(t>tv){tv=t;tm=m}}document.getElementById('ktm').textContent=tm>=0?MN[tm]:'—';document.getElementById('ktv').innerHTML=tm>=0?fmt(tv):'';var ct={};for(var m=0;m<12;m++)md(m).forEach(function(e){ct[e.c]=(ct[e.c]||0)+e.a});var top=Object.entries(ct).sort(function(a,b){return b[1]-a[1]})[0];document.getElementById('ktc').textContent=top?top[0]:'—';document.getElementById('ktcv').innerHTML=top?fmt(top[1]):''}function rChips(){document.getElementById('ch').innerHTML=CATS.map(function(c){var on=selC===c.n;return '<button class="chip'+(on?' on':'') +'" style="'+(on?'background:'+c.c+';color:#fff':'')+'" onclick="pc(\''+c.n+'\')">'+c.n+'</button>';}).join('');}function pc(n){selC=n;rChips()}function eRow(e,i,d){var c=CATS.find(function(x){return x.n===e.c})||CATS[7];return '<div class="row"><div class="rl"><div class="dot" style="background:'+c.c+'"></div><div><div class="en">'+e.n+'</div><div class="em">'+e.c+(e.d?' · '+e.d:'')+'</div></div></div><div style="display:flex;align-items:center;gap:6px"><span class="ea">'+fmt(e.a)+'</span>'+(d?'<button class="dx" onclick="del('+i+')">&#10005;</button>':'')+'</div></div>'}function rAll(){var items=md(curM);var rec=items.slice(-3).reverse();document.getElementById('rl').innerHTML=rec.length?rec.map(function(e,i){return eRow(e,items.length-1-i,true)}).join(''):'<div class="empty">אין הוצאות עדיין</div>';document.getElementById('lt').textContent='הוצאות '+MF[curM]+' — '+fmt(mt(curM));document.getElementById('fl').innerHTML=items.length?items.slice().reverse().map(function(e,ri){return eRow(e,items.length-1-ri,true)}).join(''):'<div class="empty">אין הוצאות לחודש זה</div>'}function add(){var n=document.getElementById('en').value.trim();var a=parseFloat(document.getElementById('ea').value);if(!n||isNaN(a)||a<=0){document.getElementById('en').focus();return}if(!db[curM])db[curM]=[];db[curM].push({n:n,a:a,c:selC,d:new Date().toLocaleDateString('he-IL')});save();document.getElementById('en').value='';document.getElementById('ea').value='';rMs();rKPI();rAll()}function del(i){if(!db[curM])return;db[curM].splice(i,1);if(!db[curM].length)delete db[curM];save();rMs();rKPI();rAll()}function rStats(){var totals=MN.map(function(_,m){return mt(m)});var max=Math.max.apply(null,totals)||1;var ct={};for(var m=0;m<12;m++)md(m).forEach(function(e){ct[e.c]=(ct[e.c]||0)+e.a});var tot=Object.values(ct).reduce(function(s,v){return s+v},0)||1;var html='';totals.forEach(function(t,m){var pct=Math.round(t/max*100);html+='<div class="cbar"><span class="clbl">'+MN[m]+'</span><div class="ctrk"><div class="cfil" style="width:'+pct+'%;background:'+(m===curM?'#1D9E75':'#9FE1CB')+'"></div></div><span class="cval">'+fmt(t)+'</span></div>'});html+='<div class="stitle" style="margin-top:14px">לפי קטגוריה</div>';Object.entries(ct).sort(function(a,b){return b[1]-a[1]}).forEach(function(x){var c=CATS.find(function(y){return y.n===x[0]})||CATS[7];var pct=Math.round(x[1]/tot*100);html+='<div class="cbar"><span class="clbl">'+x[0]+'</span><div class="ctrk"><div class="cfil" style="width:'+pct+'%;background:'+c.c+'"></div></div><span class="cval">'+fmt(x[1])+'</span></div>'});if(!Object.keys(ct).length)html+='<div class="empty">אין נתונים עדיין</div>';document.getElementById('cb').innerHTML=html}function sv(v){document.getElementById('va').style.display=v==='add'?'block':'none';document.getElementById('vl').style.display=v==='list'?'block':'none';document.getElementById('vs').style.display=v==='stats'?'block':'none';document.getElementById('ta').className='tab'+(v==='add'?' on':'');document.getElementById('tl').className='tab'+(v==='list'?' on':'');document.getElementById('ts').className='tab'+(v==='stats'?' on':'');if(v==='stats')rStats()}document.getElementById('yr').textContent=YEAR;rMs();rChips();rKPI();rAll();</script></body></html>
