<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="הוצאות">
<meta name="theme-color" content="#1D9E75">
<title>מעקב הוצאות</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
  .topbar-title{font-size:19px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:7px}
  .topbar-icon{width:28px;height:28px;background:#1D9E75;border-radius:8px;display:flex;align-items:center;justify-content:center}
  .topbar-icon svg{width:16px;height:16px;fill:#fff}
  .topbar-year{font-size:13px;color:#888;background:#f0f0f0;padding:4px 10px;border-radius:20px}
  .month-scroll{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid #eee}
  .month-scroll::-webkit-scrollbar{display:none}
  .mbtn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#666;font-family:inherit;transition:all .15s}
  .mbtn.on{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:600}
  .mbtn.has{border-color:#1D9E75;color:#1D9E75}
  .mbtn.on.has{color:#fff}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
  .kpi{background:#fff;border-radius:14px;padding:14px;border:1px solid #eee}
  .kpi-label{font-size:12px;color:#888;margin-bottom:6px}
  .kpi-val{font-size:23px;font-weight:700;color:#1a1a1a}
  .kpi-val.red{color:#D85A30}
  .kpi-val.teal{color:#1D9E75}
